<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e5a8a"/>
      <stop offset="50%" stop-color="#1a8fd1"/>
      <stop offset="100%" stop-color="#2ec866"/>
    </linearGradient>
  </defs>

  <!-- Background hexagon dengan rounded corners -->
  <path d="M32 3 L57 17.5 L57 46.5 L32 61 L7 46.5 L7 17.5 Z"
        fill="url(#favGrad)"
        rx="4"/>

  <!-- Inner stroke ring -->
  <path d="M32 10 L51 20.5 L51 43.5 L32 54 L13 43.5 L13 20.5 Z"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>

  <!-- Clock circle -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- Clock hour hand (12 o'clock) -->
  <line x1="32" y1="32" x2="32" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Clock minute hand (3 o'clock area) -->
  <line x1="32" y1="32" x2="40" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Circular arrow top right -->
  <path d="M32 17.5 A14.5 14.5 0 0 1 44.5 26"
        fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polygon points="44,20 49,28 41,27" fill="white"/>

  <!-- Circular arrow bottom left -->
  <path d="M32 46.5 A14.5 14.5 0 0 1 19.5 38"
        fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polygon points="20,44 15,36 23,37" fill="white"/>

  <!-- Checkmark green -->
  <path d="M23 32 L29 38 L41 26"
        fill="none"
        stroke="#2ec866"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
